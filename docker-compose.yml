version: '3.8'

services:
  # Neo4j 
  neo4j:
    image: neo4j:5.15-community
    container_name: crawler-neo4j
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 
  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  #FastAPI
  backend:
    build: ./backend
    container_name: crawler-backend
    ports:
      - "8000:8000"
    environment:
      - AURADB_URI=${AURADB_URI}
      - AURADB_USER=${AURADB_USER}
      - AURADB_PASSWORD=${AURADB_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React (Next.js)
  frontend:
      build: ./frontend
      container_name: crawler-frontend
      ports:
        - "3000:3000"  # CHANGÉ : Next.js utilise le port 3000 par défaut
      environment:
        # Pour pointer vers Render, utilise les variables du .env
        # Pour dev local, mets: http://localhost:8000 et ws://localhost:8000
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      volumes:
        - ./frontend:/app
        - /app/node_modules # CRUCIAL : Garde les dépendances Linux du conteneur
      # CHANGÉ : On retire "-- --host" qui est une syntaxe Vite.
      # Next.js écoute souvent sur 0.0.0.0 par défaut dans Docker, sinon "pnpm run dev" suffit
      command: pnpm run dev

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data: